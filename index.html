<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #fcf9f7; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        /* Banners */
        .banner-principal { width: 100%; height: 400px; background: #ddd; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; }
        .banner-categoria { display: flex; gap: 10px; margin-bottom: 30px; }
        .cat-item { flex: 1; height: 150px; background: #b79492; color: white; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        /* Produtos */
        .grade-produtos { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .produto-card { background: white; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .banner-meio { width: 100%; height: 150px; background: #d0dbe3; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. Banners Rotativos (simulado como uma imagem única por agora) -->
        <div class="banner-principal">Banner Rotativo (Colocar aqui o slide 1 de 4)</div>

        <!-- 2. Banner por Categoria -->
        <div class="banner-categoria">
            <div class="cat-item">Categoria 1</div>
            <div class="cat-item">Categoria 2</div>
            <div class="cat-item">Categoria 3</div>
        </div>

        <!-- 3. Primeiros Produtos -->
        <h2>Favoritos</h2>
        <div class="grade-produtos">
            <div class="produto-card">Produto 1</div>
            <div class="produto-card">Produto 2</div>
            <div class="produto-card">Produto 3</div>
            <div class="produto-card">Produto 4</div>
        </div>

        <!-- 4. Banner entre produtos -->
        <div class="banner-meio">Banner de Promoção</div>

        <!-- 5. Mais produtos -->
        <h2>Outras Ofertas</h2>
        <div class="grade-produtos">
            <div class="produto-card">Produto A</div>
            <div class="produto-card">Produto B</div>
            <div class="produto-card">Produto C</div>
            <div class="produto-card">Produto D</div>
        </div>
    </div>

</body>
</html>
